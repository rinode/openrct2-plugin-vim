name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build plugin
      run: npm run build
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: build/openrct2-plugin-vim.js
        body: |
          ## Installation
          Download `openrct2-plugin-vim.js` and place it in your OpenRCT2 plugin directory:
          - Windows: `C:\Users\<YourUsername>\Documents\OpenRCT2\plugin\`
          - macOS: `~/Library/Application Support/OpenRCT2/plugin/`
          - Linux: `~/.config/OpenRCT2/plugin/`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
